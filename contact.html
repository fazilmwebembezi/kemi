<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Muhanguzi Oscar</title>
</head>
<body>
    <header><h1>Muhanguzi Oscar</h1></header>
    <nav><!-- same nav --></nav>

    <main>
        <h2>Contact Me</h2>
        
        <!-- Contact form with required HTML5 attributes (form validation is handled by browser) -->
        <form action="#" method="post">
            <label for="name">Name:</label><br>
            <input type="text" id="name" name="name" required><br><br>
            
            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email" required><br><br>
            
            <label for="phone">Phone:</label><br>
            <input type="tel" id="phone" name="phone"><br><br>
            
            <label for="message">Message:</label><br>
            <textarea id="message" name="message" rows="5" required></textarea><br><br>
            
            <button type="submit">Send Message</button>
        </form>
        <p><small>Note: This is a semantic HTML5 form. Browser built-in validation is active (required fields, email format, etc.).</small></p>
    </main>

    <footer>
        <p>&copy; 2026 Muhanguzi Oscar</p>
    </footer>
</body>
</html>
